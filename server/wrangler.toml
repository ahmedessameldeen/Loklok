name = "loklok-server"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# JWT signing secret — never commit a real value.
#   Production:  wrangler secret put LOKLOK_JWT_SECRET
#   Local dev:   add LOKLOK_JWT_SECRET to a .dev.vars file (gitignored)

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

# SQLite-backed Durable Objects (free tier). Required for the storage.sql API.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]
