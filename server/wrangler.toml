name = "loklok-server"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# JWT signing secret. For local dev this default is used; in production set a real
# secret with:  wrangler secret put LOKLOK_JWT_SECRET
[vars]
LOKLOK_JWT_SECRET = "dev-secret-change-me"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

# SQLite-backed Durable Objects (free tier). Required for the storage.sql API.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]
